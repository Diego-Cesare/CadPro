<!doctype html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Cadastro de Produto</title>
  </head>
  <body>
    <div class="container">
      <h2>CadPro</h2>

      <div class="code-buttons">
        <button class="scan-btn" onclick="abrirCamera()">
          <i class="ph ph-device-mobile-camera"></i>
          Ler Código
        </button>
        <div class="manual-code">
          <button class="manual-btn" onclick="digitarCodigo()">
            <i class="ph ph-keyboard"></i>
          </button>
          <label for=""
            >Digite o codigo de barras
            <input
              type="text"
              id="barcode"
              placeholder="Código de barras"
              readonly
            />
          </label>
        </div>
      </div>

      <form onsubmit="event.preventDefault()">
        <div style="position: relative">
          <video id="video" playsinline></video>
          <div id="overlay"></div>
        </div>
        <label for=""
          >Digite o nome do produto
          <input
            type="text"
            id="nome"
            placeholder="Ex.: Arroz parboerizado Tiu João 1kg"
          />
        </label>
        <label for=""
          >Quantidade de produtos
          <input type="number" id="quantidade" placeholder="Quantidade" />
        </label>
        <label for=""
          >Selecione a data de validade do produto
          <input type="date" id="validade" />
        </label>
      </form>
      <div class="actions-buttons">
        <pre id="output"></pre>
        <button class="save-btn" onclick="salvar()">
          <i class="ph ph-floppy-disk-back"></i> Salvar
        </button>
      </div>
    </div>

    <script>
      let stream = null;
      let codeReader = new ZXing.BrowserMultiFormatReader();
      let lendo = false;

      function abrirCamera() {
        const video = document.getElementById("video");
        const overlay = document.getElementById("overlay");

        video.style.display = "block";
        overlay.style.display = "block";

        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.UPC_A,
          ZXing.BarcodeFormat.UPC_E,
        ]);

        codeReader = new ZXing.BrowserMultiFormatReader(hints);

        navigator.mediaDevices
          .getUserMedia({
            video: {
              facingMode: "environment",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          })
          .then((s) => {
            stream = s;
            video.srcObject = stream;
            video.play();

            // fallback automático entre métodos
            video.onloadedmetadata = () => {
              tentarLeitura(video);
            };
          })
          .catch(() => alert("Erro ao acessar câmera"));
      }

      function tentarLeitura(video) {
        // Método 1: leitura direta
        codeReader.decodeFromVideoDevice(null, video, (result, err) => {
          if (result && !lendo) {
            sucessoLeitura(result.text);
          }
        });

        // Método 2: fallback com crop central
        setTimeout(() => {
          if (!lendo) {
            leituraComCrop(video);
          }
        }, 2500);
      }

      function leituraComCrop(video) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const largura = video.videoWidth;
        const altura = video.videoHeight;

        // área central (melhor zona de leitura)
        const cropW = largura * 0.6;
        const cropH = altura * 0.3;

        canvas.width = cropW;
        canvas.height = cropH;

        const loop = setInterval(() => {
          if (lendo) {
            clearInterval(loop);
            return;
          }

          ctx.drawImage(
            video,
            largura * 0.2, // X (centro)
            altura * 0.35, // Y (centro vertical)
            cropW,
            cropH,
            0,
            0,
            cropW,
            cropH,
          );

          try {
            const imageData = ctx.getImageData(0, 0, cropW, cropH);

            // melhora contraste
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
              const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
              const val = avg > 140 ? 255 : 0;

              data[i] = val;
              data[i + 1] = val;
              data[i + 2] = val;
            }

            // converte para bitmap
            const luminance = new ZXing.RGBLuminanceSource(
              imageData.data,
              cropW,
              cropH,
            );

            const binaryBitmap = new ZXing.BinaryBitmap(
              new ZXing.HybridBinarizer(luminance),
            );

            const resultado = codeReader.decode(binaryBitmap);

            if (resultado && !lendo) {
              sucessoLeitura(resultado.text);
              clearInterval(loop);
            }
          } catch (e) {
            // normal falhar várias vezes
          }
        }, 250);
      }
    </script>
  </body>
</html>
