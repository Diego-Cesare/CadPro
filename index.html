<!doctype html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Cadastro de Produto</title>
  </head>
  <body>
    <div class="container">
      <h2>CadPro</h2>

      <div class="code-buttons">
        <button class="scan-btn" onclick="abrirCamera()">
          <i class="ph ph-device-mobile-camera"></i>
          Ler Código
        </button>
        <div class="manual-code">
          <button class="manual-btn" onclick="digitarCodigo()">
            <i class="ph ph-keyboard"></i>
          </button>
          <label for=""
            >Digite o codigo de barras
            <input
              type="text"
              id="barcode"
              placeholder="Código de barras"
              readonly
            />
          </label>
        </div>
      </div>

      <form onsubmit="event.preventDefault()">
        <div id="scanner" style="position: relative"></div>
        <div id="overlay"></div>
        <label for=""
          >Digite o nome do produto
          <input
            type="text"
            id="nome"
            placeholder="Ex.: Arroz parboerizado Tiu João 1kg"
          />
        </label>
        <label for=""
          >Quantidade de produtos
          <input type="number" id="quantidade" placeholder="Quantidade" />
        </label>
        <label for=""
          >Selecione a data de validade do produto
          <input type="date" id="validade" />
        </label>
      </form>
      <div class="actions-buttons">
        <pre id="output"></pre>
        <button class="save-btn" onclick="salvar()">
          <i class="ph ph-floppy-disk-back"></i> Salvar
        </button>
      </div>
    </div>

    <script>
      let stream = null;
      let lendo = false;

      function digitarCodigo() {
        const input = document.getElementById("barcode");
        input.removeAttribute("readonly");
        input.focus();
        // Opcional: voltar a ser readonly ao perder o foco
        input.onblur = () => input.setAttribute("readonly", true);
      }

      function abrirCamera() {
        const scanner = document.getElementById("scanner");
        const overlay = document.getElementById("overlay");

        scanner.style.display = "block";
        overlay.style.display = "block";

        Quagga.init(
          {
            inputStream: {
              name: "LiveStream",
              type: "LiveStream",
              target: scanner,
              constraints: {
                facingMode: "environment", // Prioriza a câmera traseira
              },
            },
            decoder: {
              readers: ["ean_reader", "ean_8_reader", "code_128_reader"],
            },
          },
          function (err) {
            if (err) {
              console.error(err);
              alert("Erro ao acessar a câmera. Verifique as permissões.");
              return;
            }
            Quagga.start();
          },
        );

        Quagga.onDetected((result) => {
          if (!lendo) {
            lendo = true;
            const codigo = result.codeResult.code;
            document.getElementById("barcode").value = codigo;

            if (navigator.vibrate) navigator.vibrate(100);
            pararCamera();
          }
        });
      }

      function pararCamera() {
        lendo = false;
        Quagga.stop();
        document.getElementById("scanner").style.display = "none";
        document.getElementById("overlay").style.display = "none";
      }

      function salvar() {
        const produto = {
          codigo: document.getElementById("barcode").value,
          nome: document.getElementById("nome").value,
          quantidade: document.getElementById("quantidade").value,
          validade: document.getElementById("validade").value,
        };

        if (!produto.codigo || !produto.nome) {
          alert("Por favor, preencha os campos principais!");
          return;
        }

        console.log("Produto Salvo:", produto);
        alert("Produto salvo com sucesso!");
        // Aqui você enviaria para um banco de dados ou localStorage
      }
    </script>
  </body>
</html>
